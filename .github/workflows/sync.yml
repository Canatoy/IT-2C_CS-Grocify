name: Sync to Web Mirror

on:
  push:
    branches:
      - Production

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: Production 
          
      - name: Push to Personal Mirror
        run: |
          git remote add mirror https://x-access-token:${{ secrets.MIRROR_TOKEN }}@github.com/Zyxavy/Grocify-mirror-clone.git
          git push --force Production:main  # Push Production branch to mirror's main