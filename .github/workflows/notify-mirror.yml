name: Notify Mirror on Push

on:
  push:
    branches:
      - Production

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Mirror Deploy
        run: |
          curl -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.MIRROR_TOKEN }}" \
            https://api.github.com/repos/Zyxavy/Grocify-mirror-clone/dispatches \
            -d '{"event_type":"production-updated"}'